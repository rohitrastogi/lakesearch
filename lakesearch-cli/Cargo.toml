[package]
name = "lakesearch-cli"
version = "0.1.0"
edition = "2021"

[dependencies]
lakesearch-core = { path = "../lakesearch-core" }
clap = { version = "4", features = ["derive"] }
parquet = { version = "54", features = ["arrow"] }
arrow = "54"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
lakesearch-core = { path = "../lakesearch-core", features = ["test-utils"] }
tempfile = "3"
